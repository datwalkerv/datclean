<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#080808"/>
  <!-- Green badge -->
  <rect x="12" y="12" width="76" height="76" rx="16" fill="#39ff14" filter="url(#glow)"/>
  <!-- "dc" text -->
  <text
    x="50"
    y="67"
    text-anchor="middle"
    font-family="'Inter', system-ui, sans-serif"
    font-weight="900"
    font-size="38"
    letter-spacing="-2"
    fill="#080808"
  >dc</text>
</svg>
